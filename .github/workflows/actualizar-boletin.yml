name: Actualizar boletín BCP

on:
  push:
    branches: [main]
    paths:
      - 'boletines/**.xlsm'
      - 'boletines/**.xlsx'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install xlsx@0.18.5

      - name: Procesar boletines subidos a mano
        run: node scripts/actualizar-boletin.mjs

      - name: Commitear y pushear si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/creditos-sector.json boletines/
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos, nada que commitear."
            exit 0
          fi
          git commit -m "Actualizar datos de créditos por sector ($(date -u +%Y-%m))"
          git push
